[workspace]
name = "igris_c_description"
version = "0.1.0"
channels = ["conda-forge"]
platforms = ["linux-64"]

[dependencies]
python = "3.12.*"
libxml2 = ">=2.12,<3"
cmake-format = "0.6.*"
ruff = ">=0.14.5,<0.15"

[environments]
default = { features = [], solve-group = "default" }
dev = { features = ["dev"], solve-group = "default" }

[feature.dev.dependencies]
pytest = "*"
ipython = "*"
